<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Day New Way | Therapeutic Outdoor Learning</title>
    <!-- Favicon  -->
    <link rel="icon" type="image/x-icon" href="/static/img/logo.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('static/img/logo.png') center/cover no-repeat; 
        }
    </style>
</head>
<body class="bg-emerald-50 text-emerald-950">

<!-- Navbar with Mobile Menu -->
<nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5">
        <div class="flex justify-between items-center">
            
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3">
                <img src="static/img/logocrop.png" alt="New Day New Way Logo" class="h-10 w-auto">
                <span class="text-2xl font-bold hidden sm:block">New Day New Way</span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex gap-8 text-lg font-medium">
                <a href="index.html" class="hover:text-emerald-600">Home</a>
                <a href="about.html" class="hover:text-emerald-600">About</a>
                <a href="whatwedo.html" class="hover:text-emerald-600">What We Do</a>
                <a href="animal.html" class="hover:text-emerald-600">Animals</a>
                <a href="contact.html" class="hover:text-emerald-600">Contact</a>
            </div>

            <!-- Mobile Hamburger Button -->
            <button id="mobile-menu-button" 
                    class="md:hidden text-3xl text-emerald-700">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 py-4 border-t">
            <div class="flex flex-col gap-4 text-lg font-medium">
                <a href="index.html" class="hover:text-emerald-600">Home</a>
                <a href="about.html" class="hover:text-emerald-600">About</a>
                <a href="whatwedo.html" class="hover:text-emerald-600">What We Do</a>
                <a href="animal.html" class="hover:text-emerald-600">Animals</a>
                <a href="contact.html" class="hover:text-emerald-600">Contact</a>
            </div>
        </div>
    </div>
</nav>

<script>
    const menuButton = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');
    
    menuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        
        // Toggle icon between bars and X
        const icon = menuButton.querySelector('i');
        if (icon.classList.contains('fa-bars')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-xmark');
        } else {
            icon.classList.remove('fa-xmark');
            icon.classList.add('fa-bars');
        }
    });
</script>

    <!-- Hero -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-bold mb-6">Embrace Adventure</h1>
            <p class="text-2xl md:text-3xl mb-10">Alternative Learning in a Therapeutic Outdoor Environment</p>
            <a href="whatwedo.html" class="bg-emerald-600 text-white px-10 py-4 rounded-full text-xl font-semibold hover:bg-emerald-700">Explore Activities</a>
        </div>
    </section>

    <!-- Safeguarding Policy - Centered -->
    <div class="max-w-7xl mx-auto px-6 py-12 flex justify-center">
        <a href="Safeguarding-policy 28.4.26.pdf" 
           target="_blank"
           class="inline-flex items-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-5 rounded-full text-lg font-medium shadow-lg transition">
            <i class="fa-solid fa-shield-halved text-xl"></i>
            View Safeguarding Policy
        </a>
    </div>

</body>
</html>
